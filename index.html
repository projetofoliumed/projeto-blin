<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Foliumed × Cannect — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g0:#0B2018;--g1:#143527;--g2:#1F7A4D;--g3:#34C77B;--g4:#5FE39B;
  --lime:#B6F500;--lime2:#9BD400;
  --g-light:#E7F6EE;--g-mid:#C2EAD4;--g-soft:#F3FBF6;
  --ink:#0B1510;--ink2:#384840;--ink3:#7C8A82;--ink4:#AEBAB2;
  --bg:#EFF3F0;--surface:#FFF;--border:#E2EAE5;--border2:#EEF3EF;
  --red:#E03E2F;--red-light:#FCEDEB;--red-mid:#F4C9C3;
  --amber:#C98700;--amber-light:#FFF6E0;--amber-mid:#F1DBA0;
  --violet:#6C5CE7;--violet-light:#EEEBFC;
  --blue:#2B82C9;--blue-light:#E8F2FB;
  --r:14px;--r-sm:9px;
  --sh:0 1px 2px rgba(11,32,24,.04),0 4px 14px rgba(11,32,24,.05);
  --sh-h:0 8px 28px rgba(11,32,24,.13);
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.45}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* HEADER */
.header{background:radial-gradient(120% 160% at 0% 0%,#1C5036 0%,var(--g0) 70%);color:#fff;padding:22px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(182,245,0,.14),transparent 70%);pointer-events:none}
.header-l{display:flex;align-items:center;gap:15px;z-index:1}
.logo-dot{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--g3),var(--lime));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 14px rgba(52,199,123,.4)}
.header h1{font-size:19px;font-weight:800;letter-spacing:-.4px}
.header .sub{font-size:12px;opacity:.6;margin-top:3px;letter-spacing:.2px;font-weight:500}
.header-r{display:flex;align-items:center;gap:10px;z-index:1}
.phase-pill{background:rgba(182,245,0,.14);border:1px solid rgba(182,245,0,.3);color:var(--lime);border-radius:9px;padding:7px 14px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:7px}
.phase-dot{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(182,245,0,.25);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.tag{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:7px 13px;font-size:11px;font-weight:600;white-space:nowrap;color:rgba(255,255,255,.85)}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 30px;display:flex;gap:4px;position:sticky;top:0;z-index:20;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:15px 18px;font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:8px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--g2);border-bottom-color:var(--g3)}
.tab .tcount{background:var(--g-light);color:var(--g2);font-size:10.5px;font-weight:800;padding:1px 8px;border-radius:10px;min-width:20px;text-align:center}
.tab.active .tcount{background:var(--g3);color:#fff}

.main{padding:24px 26px 64px;max-width:1300px;margin:0 auto}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.main{animation:fade .35s ease}

/* PAGE HEAD */
.page-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.page-ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
.page-ico.med{background:linear-gradient(135deg,#E7F6EE,#C2EAD4)}
.page-ico.pac{background:linear-gradient(135deg,#EEEBFC,#D9D2F7)}
.page-ico.b2c{background:linear-gradient(135deg,#FFF6E0,#F1DBA0)}
.page-head h2{font-size:20px;font-weight:800;letter-spacing:-.4px}
.page-head p{font-size:12.5px;color:var(--ink3);margin-top:2px}

/* GOALS */
.goals{background:linear-gradient(135deg,var(--g0),#16382A);border-radius:18px;padding:22px 26px;margin-bottom:20px;position:relative;overflow:hidden}
.goals::after{content:'';position:absolute;right:-40px;bottom:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(52,199,123,.16),transparent 70%)}
.goals-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;flex-wrap:wrap;gap:6px;position:relative;z-index:1}
.goals-top h3{font-size:13px;font-weight:800;letter-spacing:.3px;color:#fff;display:flex;align-items:center;gap:8px}
.goals-top .ctx{font-size:11px;color:rgba(255,255,255,.55)}
.goals-top .ctx b{color:var(--lime)}
.goal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;position:relative;z-index:1}
@media(max-width:860px){.goal-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.goal-grid{grid-template-columns:1fr;gap:16px}}
.goal-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.goal-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:6px}
.goal-val{color:#fff}
.goal-val b{font-size:21px;font-weight:800;letter-spacing:-.5px}
.goal-val span{font-size:12px;color:rgba(255,255,255,.45)}
.goal-track{height:8px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.goal-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--g3),var(--lime));transition:width 1.1s cubic-bezier(.34,1.2,.4,1);min-width:3px;box-shadow:0 0 12px rgba(182,245,0,.4)}
.goal-pct{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:6px;display:flex;justify-content:space-between}
.goal-pct b{color:var(--lime);font-weight:800}

/* HERO KPIs */
.hero-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:860px){.hero-strip{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.hero-strip{grid-template-columns:1fr}}
.hero{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.hero:hover{box-shadow:var(--sh-h);transform:translateY(-3px)}
.hero.feat{background:linear-gradient(135deg,var(--g1),var(--g0));border-color:var(--g0)}
.hero.feat *{color:#fff}
.hero-lbl{font-size:10.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.hero.feat .hero-lbl{color:rgba(255,255,255,.6)}
.hero-val{font-size:36px;font-weight:800;line-height:1;margin:10px 0 4px;letter-spacing:-1.5px}
.hero-val.sm{font-size:27px;letter-spacing:-1px}
.hero-sub{font-size:11.5px;color:var(--ink3)}
.hero.feat .hero-sub{color:rgba(255,255,255,.55)}
.hero-spark{position:absolute;right:14px;bottom:14px;width:70px;height:32px;opacity:.9}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;padding:3px 8px;border-radius:7px;margin-top:7px}
.delta.up{background:var(--g-light);color:var(--g2)}
.hero.feat .delta.up{background:rgba(182,245,0,.18);color:var(--lime)}

/* PANELS */
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cols-12{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.cols-2,.cols-3,.cols-12{grid-template-columns:1fr}}
.cols-2>.panel,.cols-3>.panel,.cols-12>.panel{display:flex;flex-direction:column}
.cols-2>.panel>.pb,.cols-3>.panel>.pb,.cols-12>.panel>.pb{flex:1;display:flex;flex-direction:column}
.cols-2>.panel>.pb>.insight:last-child,.cols-12>.panel>.pb>.insight:last-child{margin-top:auto}
.panel{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.panel.span{grid-column:1/-1}
.ph{padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.ph h3{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:8px}
.ph-sub{font-size:11px;color:var(--ink3);margin-top:1px;font-weight:400}
.pb{padding:20px}

.section-lbl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:14px;display:flex;align-items:center;gap:9px}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border2)}

/* mini metrics */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}
.mc{border-radius:var(--r-sm);border:1px solid var(--border);padding:14px 15px;transition:border-color .2s,transform .2s}
.mc:hover{transform:translateY(-2px)}
.mc.acc{background:var(--g-soft);border-color:var(--g-mid)}
.mc.warn{background:var(--red-light);border-color:var(--red-mid)}
.mc.pend{background:var(--amber-light);border-color:var(--amber-mid)}
.mc.viol{background:var(--violet-light);border-color:#D9D2F7}
.mc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink3)}
.mc-val{font-size:27px;font-weight:800;line-height:1;margin:7px 0 3px;letter-spacing:-1px}
.mc-val.g{color:var(--g2)}.mc-val.r{color:var(--red)}.mc-val.a{color:var(--amber)}.mc-val.v{color:var(--violet)}
.mc-sub{font-size:11px;color:var(--ink3)}

/* PROPORTIONAL FUNNEL — labels OUTSIDE bars, dark text */
.funnel3{display:flex;flex-direction:column;gap:3px;margin:6px 0}
.fs-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.fs-lbl{font-size:12.5px;font-weight:700;color:var(--ink2)}
.fs-val{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--ink)}
.fs-track{height:14px;background:var(--bg);border-radius:7px;position:relative;display:flex;align-items:center}
.fs-bar{height:100%;border-radius:7px;transition:width .9s cubic-bezier(.34,1.1,.4,1);min-width:6px}
.fs-conv{position:absolute;right:10px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;pointer-events:none}
.fconn{display:flex;align-items:center;justify-content:center;gap:8px;padding:3px 0;font-size:11px}
.fconn .drop{font-weight:800;padding:2px 10px;border-radius:20px;font-size:10.5px}
.fconn .drop.ok{background:var(--g-light);color:var(--g2)}
.fconn .drop.warn{background:var(--amber-light);color:var(--amber)}
.fconn .drop.bad{background:var(--red-light);color:var(--red)}
.fconn .txt{color:var(--ink3)}

/* conv chips */
.cr-strip{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.cr{flex:1;min-width:130px;background:var(--g-soft);border:1px solid var(--g-mid);border-radius:var(--r-sm);padding:13px 14px}
.cr.bad{background:var(--red-light);border-color:var(--red-mid)}
.cr-v{font-size:23px;font-weight:800;color:var(--g2);letter-spacing:-.5px}
.cr.bad .cr-v{color:var(--red)}
.cr-l{font-size:10.5px;color:var(--ink3);margin-top:3px;font-weight:600}

/* INSIGHT CARD */
.insight{display:flex;gap:13px;background:linear-gradient(120deg,var(--g-soft),#fff);border:1px solid var(--g-mid);border-left:4px solid var(--g3);border-radius:var(--r-sm);padding:14px 16px;margin-top:16px}
.insight.warn{background:linear-gradient(120deg,var(--amber-light),#fff);border-color:var(--amber-mid);border-left-color:var(--amber)}
.insight.viol{background:linear-gradient(120deg,var(--violet-light),#fff);border-color:#D9D2F7;border-left-color:var(--violet)}
.insight .ico{font-size:20px;flex-shrink:0;line-height:1.2}
.insight .body{font-size:12.5px;color:var(--ink2);line-height:1.55}
.insight .body b{color:var(--ink)}
.insight .body .hl{font-weight:800;color:var(--g2)}
.insight.warn .body .hl{color:var(--amber)}
.insight.viol .body .hl{color:var(--violet)}

/* lists */
.list-sec{margin-top:18px;border-top:1px solid var(--border2);padding-top:15px}
.list-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.list-ttl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.list-ttl.red{color:var(--red)}.list-ttl.amber{color:var(--amber)}.list-ttl.muted{color:var(--ink3)}
.chev{font-size:11px;color:var(--ink3);transition:transform .2s}
.list-hd.open .chev{transform:rotate(90deg)}
.list-body{display:none;margin-top:11px}
.list-hd.open + .list-body{display:block}
.li{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;margin-bottom:5px;font-size:12px}
.li.red{background:var(--red-light)}.li.amber{background:var(--amber-light)}.li.muted{background:var(--bg)}
.li .nm{font-weight:600;color:var(--ink2);flex:1}
.li .rs{font-size:11px;font-style:italic}
.li.red .rs{color:var(--red)}.li.amber .rs{color:var(--amber);font-style:normal;font-weight:600}.li.muted .nm{color:var(--ink3);font-weight:500}
.li .tagx{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:2px 8px;border-radius:6px;background:rgba(0,0,0,.05);color:var(--ink3)}

/* SEGMENT / RANKING bars */
.seg{display:flex;flex-direction:column;gap:10px}
.seg-row{display:flex;align-items:center;gap:11px}
.seg-rank{font-size:11px;font-weight:800;color:var(--ink4);width:16px;text-align:center;flex-shrink:0}
.seg-lbl{font-size:11.5px;color:var(--ink2);width:120px;flex-shrink:0;font-weight:600}
.seg-wrap{flex:1;height:24px;background:var(--bg);border-radius:6px;overflow:hidden}
.seg-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;transition:width .9s cubic-bezier(.34,1.1,.4,1)}
.seg-bar span{font-size:11px;font-weight:800;color:#fff}
.seg-n{font-size:12px;color:var(--ink2);width:24px;flex-shrink:0;font-weight:700;text-align:right}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:10px;flex:1;min-width:140px}
.leg-row{display:flex;align-items:center;gap:10px;font-size:12px}
.leg-dot{width:11px;height:11px;border-radius:4px;flex-shrink:0}
.leg-nm{color:var(--ink2);flex:1;font-weight:500}
.leg-v{font-weight:800;color:var(--ink)}
.leg-pc{font-size:10.5px;color:var(--ink3);width:34px;text-align:right}

/* REP LEADERBOARD */
.rep-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:9px;transition:transform .2s}
.rep-card:hover{transform:translateX(3px)}
.rep-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.rep-info{flex:1}
.rep-nm{font-size:13px;font-weight:700;color:var(--ink)}
.rep-meta{font-size:11px;color:var(--ink3)}
.rep-big{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--ink)}

/* TIMELINE */
.timeline{position:relative;padding-left:8px}
.tl-step{display:flex;gap:14px;position:relative;padding-bottom:18px}
.tl-step:last-child{padding-bottom:0}
.tl-step::before{content:'';position:absolute;left:13px;top:30px;bottom:-2px;width:2px;background:var(--border)}
.tl-step:last-child::before{display:none}
.tl-step.done::before{background:var(--g3)}
.tl-node{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1;border:2px solid var(--border);background:var(--surface);color:var(--ink3)}
.tl-step.done .tl-node{background:var(--g3);border-color:var(--g3);color:#fff}
.tl-step.active .tl-node{background:var(--amber);border-color:var(--amber);color:#fff;box-shadow:0 0 0 4px var(--amber-light)}
.tl-body{flex:1;padding-top:2px}
.tl-t{font-size:13px;font-weight:700;color:var(--ink)}
.tl-step:not(.done):not(.active) .tl-t{color:var(--ink3)}
.tl-d{font-size:11.5px;color:var(--ink3);margin-top:2px}
.tl-count{font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;background:var(--bg);color:var(--ink2)}
.tl-step.done .tl-count{background:var(--g-light);color:var(--g2)}
.tl-step.active .tl-count{background:var(--amber-light);color:var(--amber)}

/* clinical scales */
.scale-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:560px){.scale-grid{grid-template-columns:1fr}}
.scale-card{border:1px dashed var(--border);border-radius:var(--r-sm);padding:14px;background:var(--g-soft)}
.scale-card.locked{opacity:.85}
.scale-t{font-size:12px;font-weight:700;color:var(--ink2);display:flex;justify-content:space-between;align-items:center}
.scale-t .lk{font-size:10px;color:var(--ink4)}
.scale-bar{height:6px;background:var(--bg);border-radius:4px;margin-top:10px;overflow:hidden}
.scale-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--g3),var(--lime));border-radius:4px}
.scale-d{font-size:10.5px;color:var(--ink3);margin-top:7px}

/* toggle */
.toggle{display:inline-flex;background:var(--bg);border-radius:9px;padding:3px;gap:2px}
.tg{padding:6px 15px;font-size:11.5px;font-weight:700;color:var(--ink3);border:none;background:none;border-radius:7px;cursor:pointer;font-family:inherit;transition:all .15s}
.tg.active{background:var(--surface);color:var(--g2);box-shadow:var(--sh)}

/* B2C month bars */
.mbar{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.mbar-l{font-size:12px;color:var(--ink2);width:50px;flex-shrink:0;font-weight:700}
.mbar-wrap{flex:1;height:34px;background:var(--bg);border-radius:8px;overflow:hidden}
.mbar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:13px;transition:width .9s cubic-bezier(.34,1.1,.4,1)}
.mbar-fill span{font-size:13px;font-weight:800;color:#fff;white-space:nowrap}
.prod-list{display:flex;flex-direction:column;gap:13px}
.prod-row .prod-nm{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.prod-nm .pv{color:var(--ink3);font-weight:500}
.prod-bg{height:26px;background:var(--bg);border-radius:6px;overflow:hidden}
.prod-fill{height:100%;background:linear-gradient(90deg,var(--g2),var(--g3));border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:9px}
.prod-fill span{font-size:10.5px;font-weight:800;color:#fff}

/* empty state */
.empty{text-align:center;padding:30px 20px;color:var(--ink3)}
.empty .ico{font-size:30px;margin-bottom:10px;opacity:.55}
.empty h4{font-size:14px;color:var(--ink2);margin-bottom:5px;font-weight:700}
.empty p{font-size:12px}

/* tooltip */
.tip{position:relative;cursor:help;border-bottom:1px dotted var(--ink4)}
.tip .tt{visibility:hidden;opacity:0;position:absolute;bottom:140%;left:50%;transform:translateX(-50%);background:var(--g0);color:#fff;font-size:11px;font-weight:400;padding:8px 11px;border-radius:8px;z-index:30;transition:opacity .15s;box-shadow:var(--sh-h);width:max-content;max-width:230px;text-align:left;line-height:1.45}
.tip:hover .tt{visibility:visible;opacity:1}
.tip .tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--g0)}

.foot{margin-top:28px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}

// ===================== HELPERS =====================
const $ = s => document.querySelector(s);
const brl = n => "R$ "+n.toLocaleString("pt-BR");
const pct = (a,b) => b? Math.round(a/b*100) : 0;
function tip(txt, inner){return `<span class="tip">${inner}<span class="tt">${txt}</span></span>`;}

function spark(pts){
  const w=70,h=30,max=Math.max(...pts),min=Math.min(...pts),rng=max-min||1,step=w/(pts.length-1);
  const d=pts.map((p,i)=>`${i?'L':'M'}${(i*step).toFixed(1)} ${(h-((p-min)/rng)*h).toFixed(1)}`).join(' ');
  const area=d+`L${w} ${h} L0 ${h} Z`;
  return `<svg class="hero-spark" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--lime)" stop-opacity=".4"/><stop offset="1" stop-color="var(--lime)" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#sg)"/><path d="${d}" fill="none" stroke="var(--lime)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function donut(segs, size=130){
  const total=segs.reduce((s,x)=>s+x.n,0);
  const R=size/2,r=R*0.6,cx=R,cy=R; let a=-Math.PI/2,paths="";
  segs.forEach(s=>{
    const frac=s.n/total,a2=a+frac*2*Math.PI;
    const x1=cx+R*Math.cos(a),y1=cy+R*Math.sin(a),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    const xi1=cx+r*Math.cos(a2),yi1=cy+r*Math.sin(a2),xi2=cx+r*Math.cos(a),yi2=cy+r*Math.sin(a);
    const large=frac>0.5?1:0;
    paths+=`<path d="M${x1} ${y1} A${R} ${R} 0 ${large} 1 ${x2} ${y2} L${xi1} ${yi1} A${r} ${r} 0 ${large} 0 ${xi2} ${yi2} Z" fill="${s.color}"/>`;
    a=a2;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="26" font-weight="800" fill="var(--ink)">${total}</text><text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--ink3)" letter-spacing="1">MÉDICOS</text></svg>`;
}

// FUNNEL — labels outside bars, dark text
function funnel(stages, opts){
  opts=opts||{}; const minW=4;
  const unit=opts.unit||'saem';
  const max=stages[0].val||1;
  let html=`<div class="funnel3">`;
  stages.forEach((s,i)=>{
    const w=Math.max(s.val/max*100, minW);
    const conv = i>0 ? pct(s.val, stages[i-1].val) : 100;
    html+=`<div class="fstep3">
      <div class="fs-head"><span class="fs-lbl">${s.lbl}</span><span class="fs-val">${s.val}</span></div>
      <div class="fs-track"><div class="fs-bar" style="width:${w}%;background:${s.color}"></div>
        ${i>0?`<span class="fs-conv">${conv}% do passo anterior</span>`:'<span class="fs-conv">topo do funil</span>'}
      </div>
    </div>`;
    const next=stages[i+1];
    if(next){
      const c=pct(next.val,s.val), drop=s.val-next.val;
      const cls=c>=50?'ok':c>=20?'warn':'bad';
      html+=`<div class="fconn"><span class="drop ${cls}">↓ ${c}%</span><span class="txt">${drop>0?`−${drop} ${unit} aqui`:'sem perda'}</span></div>`;
    }
  });
  return html+`</div>`;
}

function listSec(title, cls, items, open, render){
  return `<div class="list-sec">
    <div class="list-hd ${open?'open':''}" onclick="this.classList.toggle('open')">

    <div class="list-body">${items.map(render).join('')}</div>
  </div>`;
}

        <div class="scale-bar"><i></i></div><div class="scale-d">${s.d}</div></div>`).join('')}
    </div>
    <div class="insight" style="margin-top:16px"><div class="ico">📊</div><div class="body">Assim que o 1º paciente completar o <b>check-in do dia 6</b>, estes painéis ganham vida: evolução de dor, sono e PGIC vs. linha de base — o coração do white paper de RWE.</div></div>
    </div></div>`;
}

function viewB2C(state){
  const b=DATA.b2c,sel=state.b2cMetric||'gmv',isG=sel==='gmv';
  const vMai=isG?b.mes.mai.gmv:b.mes.mai.frascos, vJun=isG?b.mes.jun.gmv:b.mes.jun.frascos;
  const max=Math.max(vMai,vJun), fmt=v=>isG?brl(v):v+" un.", delta=pct(vJun-vMai,vMai);
  const prodMax=Math.max(...b.produtos.map(p=>p.un));
  return `<div class="page-head"><div class="page-ico b2c">🛒</div>
    <div><h2>B2C — canal direto ao consumidor</h2><p>Vendas avulsas Foliumed · maio–junho 2026 · independente do projeto</p></div></div>
  <div class="hero-strip">
    <div class="hero feat"><div class="hero-lbl">💰 GMV acumulado</div><div class="hero-val sm">${brl(b.gmv)}</div><div class="hero-sub">faturamento bruto</div>${spark([1247,2792])}</div>
    <div class="hero"><div class="hero-lbl">📦 Frascos vendidos</div><div class="hero-val sm">${b.frascos}</div><div class="hero-sub">unidades</div></div>
    <div class="hero"><div class="hero-lbl">👨‍⚕️ Médicos únicos</div><div class="hero-val sm">${b.medicosUnicos}</div><div class="hero-sub">prescritores</div></div>
    <div class="hero"><div class="hero-lbl">🧾 Maior pedido</div><div class="hero-val sm">${brl(b.maiorPedido)}</div><div class="hero-sub">6 frascos · 05/06</div></div>
  </div>
  <div class="cols-2">
    <div class="panel"><div class="ph"><div><h3>📊 Evolução mensal</h3><div class="ph-sub">maio vs. junho</div></div>
      <div class="toggle"><button class="tg ${isG?'active':''}" onclick="setMetric('gmv')">GMV</button><button class="tg ${!isG?'active':''}" onclick="setMetric('frascos')">Frascos</button></div></div>
      <div class="pb">
        <div class="mbar"><div class="mbar-l">Maio</div><div class="mbar-wrap"><div class="mbar-fill" style="width:${vMai/max*100}%;background:var(--g3)"><span>${fmt(vMai)}</span></div></div></div>
        <div class="mbar"><div class="mbar-l">Junho</div><div class="mbar-wrap"><div class="mbar-fill" style="width:100%;background:var(--g1)"><span>${fmt(vJun)}</span></div></div></div>
        <div style="margin-top:15px;display:flex;align-items:center;gap:10px"><span class="delta up" style="font-size:14px">▲ +${delta}%</span>
          <span style="font-size:11.5px;color:var(--ink3)">crescimento ${isG?'de faturamento':'de volume'} mai → jun</span></div>
        <div class="insight"><div class="ico">⚡</div><div class="body">Junho ainda em curso (até 07/06) e já <span class="hl">superou maio inteiro</span> — ${isG?`+${delta}% de GMV`:`+${delta}% em frascos`}. Ritmo acelerando.</div></div>
      </div></div>
    <div class="panel"><div class="ph"><h3>🧪 Mix de produtos</h3><div class="ph-sub">acumulado</div></div><div class="pb">
      <div class="prod-list">${b.produtos.map(p=>`<div class="prod-row"><div class="prod-nm"><span>${p.nm}</span><span class="pv">${p.un} un · ${brl(p.gmv)}</span></div>
        <div class="prod-bg"><div class="prod-fill" style="width:${p.un/prodMax*100}%"><span>${pct(p.un,b.frascos)}%</span></div></div></div>`).join('')}</div>
      <div class="insight"><div class="ico">🌅</div><div class="body">A versão <b>0,2% (Day)</b> carrega 91% das unidades. O <b>1% (Night)</b> ainda é nicho — oportunidade de educar o canal sobre o uso noturno.</div></div>
    </div></div>
  </div>`;
}

// ===================== APP =====================
const state={tab:'overview', b2cMetric:'gmv'};
const TABS=[
  {id:'overview', lbl:'Visão Geral', icon:'📊'},
  {id:'medicos', lbl:'Médicos', icon:'🩺', count:DATA.medicos.aceitos},
  {id:'pacientes', lbl:'Pacientes', icon:'🧑‍🤝‍🧑', count:DATA.pacientes.prescricoes},
  {id:'b2c', lbl:'B2C', icon:'🛒'}
];

function footer(){
  return `<div class="foot"><div class="live"><span class="d"></span> Dados Atualizados Semanalmente</div><div class="src"><div class="row">PM <b style="color:var(--ink2)">Isabela Jatobá</b></div></div></div>`;
}

function render(){
  let body = state.tab==='overview'?viewOverview()
    : state.tab==='medicos'?viewMedicos()
    : state.tab==='pacientes'?viewPacientes()
    : viewB2C(state);
  $('#app').innerHTML=`
  <div class="header">
    <div class="header-l"><div class="logo-dot">🌿</div>
      <div><h1>Foliumed × Cannect</h1><div class="sub">Projeto Frasco &amp; B2C · Real World Evidence · Brasil 2026</div></div></div>
    <div class="header-r"><div class="phase-pill"><span class="phase-dot"></span> MVP</div><div class="tag">Atualizado ${DATA.updated}</div></div>
  </div>
  <div class="tabs">${TABS.map(t=>`<button class="tab ${state.tab===t.id?'active':''}" onclick="go('${t.id}')">${t.icon} ${t.lbl}${t.count!=null?`<span class="tcount">${t.count}</span>`:''}</button>`).join('')}</div>
  <div class="main">${body}${footer()}</div>`;
}
function go(t){state.tab=t;render();window.scrollTo({top:0,behavior:'smooth'});}
function setMetric(m){state.b2cMetric=m;render();}
window.go=go;window.setMetric=setMetric;
render();
</script>
</body>
</html>
